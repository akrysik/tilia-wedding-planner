<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilia — Wedding Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;          /* app background: white */
    --card:#F6EFE2;        /* card beige */
    --card-lite:#FBF6EB;   /* lighter beige: top bar & countdown */
    --card2:#EADDC4;       /* deeper beige */
    --line:#DFD1B4;        /* hairline beige */
    --ink:#1C1813;         /* near-black text */
    --muted:#6E6353;
    --rose:#D6456B;        /* reserved for negatives: declined, over budget, delete */
    --accent:#356B4F;      /* primary accent: deep green */
    --gold:#D98E04;        /* vibrant accent 2 */
    --leaf:#4A7A52;        /* vibrant accent 3 (positive) */
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Karla',sans-serif;color:var(--ink);background:var(--bg);
    display:flex;min-height:100vh;
  }
  h1,h2,h3,.serif{font-family:'Nunito',sans-serif;font-weight:800}

  /* ===== Layout: menu LEFT, content right ===== */
  aside{
    width:230px;background:var(--card);border-right:1px solid var(--line);
    padding:26px 18px;display:flex;flex-direction:column;gap:6px;
    position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:50;
  }
  main{flex:1;padding:34px 38px;max-width:1100px;margin:0 auto;width:100%}
  .main-col{flex:1;display:flex;flex-direction:column;min-width:0;margin-left:230px}

  /* ===== Top bar ===== */
  .topbar{
    display:flex;align-items:center;justify-content:flex-end;gap:14px;
    padding:10px 24px;border-bottom:1px solid var(--line);background:var(--card-lite);
    position:sticky;top:0;z-index:20;
  }
  .icon-btn{position:relative;border:2px solid var(--card2);background:#fff;border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;transition:.15s}
  .icon-btn:hover{border-color:var(--gold)}
  .badge{position:absolute;top:-5px;right:-5px;background:var(--rose);color:#fff;border-radius:999px;font:700 10px 'Karla';padding:1px 5px;border:2px solid #fff}
  .acct{display:flex;align-items:center;gap:8px;cursor:pointer;border:2px solid transparent;border-radius:999px;padding:4px 12px 4px 4px;font:600 13px 'Karla';transition:.15s}
  .acct:hover{border-color:var(--card2)}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font:700 12px 'Karla'}
  .acct .chev{font-size:10px;color:var(--muted)}
  .dropdown{
    position:absolute;top:52px;right:0;background:#fff;border:1px solid var(--line);
    border-radius:12px;box-shadow:0 10px 28px rgba(28,24,19,.14);min-width:280px;z-index:40;padding:8px;text-align:left;
  }
  .dd-wrap{position:relative}
  .dd-head{font:700 11px 'Karla';text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 10px 6px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .dd-head button{border:0;background:none;color:var(--gold);font:700 11px 'Karla';cursor:pointer}
  .dd-item{display:flex;align-items:center;gap:10px;width:100%;border:0;background:none;text-align:left;padding:9px 10px;border-radius:8px;font:600 13px 'Karla';color:var(--ink);cursor:pointer}
  .dd-item:hover{background:var(--card)}
  .dd-item.danger{color:var(--rose)}
  .dd-sep{border:0;border-top:1px solid var(--line);margin:6px 0}
  .notif-item{display:flex;gap:10px;padding:9px 10px;border-radius:8px;font-size:12.5px;line-height:1.4;align-items:flex-start;cursor:default}
  .notif-item:hover{background:var(--card)}
  .notif-item .n-ico{font-size:15px;margin-top:1px}
  .notif-item .n-when{font-size:10.5px;color:var(--muted)}
  .notif-item.unread{background:#FDF7EC}
  .notif-item .n-dot{width:8px;height:8px;border-radius:50%;background:var(--rose);margin-top:5px;flex-shrink:0}

  /* ===== Login overlay ===== */
  .login-overlay{position:fixed;inset:0;background:var(--card);display:flex;align-items:center;justify-content:center;z-index:100}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:36px;width:360px;max-width:92vw;text-align:center}
  .login-card h2{font-size:26px;margin:6px 0 2px}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .login-card input{width:100%;margin-bottom:10px}
  .login-card .btn{width:100%;padding:11px}
  .login-card .alt{margin-top:12px;width:100%;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:10px;font:600 13px 'Karla';cursor:pointer}
  .login-card .alt:hover{border-color:var(--ink)}
  .brand{font-family:'Nunito',sans-serif;font-size:38px;letter-spacing:.5px;margin-bottom:2px;line-height:1.1}
  .brand em{font-style:normal;color:var(--accent)}
  .tagline{font-size:11.5px;color:var(--muted);margin-bottom:18px}

  .lang-switch{
    display:flex;border:2px solid #9CC3AA;border-radius:999px;overflow:hidden;width:max-content;background:#fff;
  }
  .lang-switch button{
    border:0;background:transparent;padding:6px 14px;font:600 12px 'Karla';cursor:pointer;color:var(--ink);
  }
  .lang-switch button.active{background:linear-gradient(180deg,#DCEDE2,#C4DFCE);color:var(--accent)}

  nav button{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    border:2px solid transparent;background:transparent;border-radius:10px;
    padding:10px 12px;font:600 14px 'Karla';color:var(--ink);cursor:pointer;transition:.15s;
  }
  nav button:hover{background:var(--card2)}
  nav button.active{border-color:var(--accent);background:#fff;color:var(--accent)}
  nav .ico{font-size:16px;width:20px;text-align:center}
  .aside-foot{margin-top:auto;font-size:11px;color:var(--muted);line-height:1.5}

  /* ===== Shared bits ===== */
  .page-title{font-size:30px;margin-bottom:4px}
  .page-title.names{font-size:48px;letter-spacing:.5px}
  .page-title.names em{font-style:normal;color:var(--accent)}
  .page-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .grid{display:grid;gap:16px}
  .btn{
    border:2px solid var(--accent);background:linear-gradient(180deg,#fff 0%,#EBF2EE 100%);color:var(--accent);
    border-radius:999px;padding:8px 18px;font:700 13px 'Karla';cursor:pointer;transition:.18s;
    box-shadow:0 1px 2px rgba(53,107,79,.18);
  }
  .btn:hover{background:linear-gradient(180deg,#47805F 0%,var(--accent) 55%,#28543D 100%);color:#fff;box-shadow:0 3px 8px rgba(53,107,79,.35);transform:translateY(-1px)}
  .btn:active{transform:translateY(0);box-shadow:0 1px 2px rgba(53,107,79,.25)}
  .btn.gold{border-color:var(--gold);color:#A86E03;background:linear-gradient(180deg,#fff 0%,#FBF1DC 100%);box-shadow:0 1px 2px rgba(217,142,4,.18)}
  .btn.gold:hover{background:linear-gradient(180deg,#E9A82E 0%,var(--gold) 55%,#B97802 100%);color:#fff;box-shadow:0 3px 8px rgba(217,142,4,.35)}
  .btn.leaf{border-color:var(--leaf);color:var(--leaf);background:linear-gradient(180deg,#fff 0%,#ECF3ED 100%);box-shadow:0 1px 2px rgba(74,122,82,.18)}
  .btn.leaf:hover{background:linear-gradient(180deg,#5C8F64 0%,var(--leaf) 55%,#3C6543 100%);color:#fff;box-shadow:0 3px 8px rgba(74,122,82,.35)}
  .btn.sm{padding:4px 12px;font-size:12px}
  .chip{display:inline-block;border-radius:999px;padding:3px 10px;font:700 11px 'Karla';border:1.5px solid}
  input[type=text],input[type=date],input[type=number],select,textarea{
    border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 10px;
    font:500 13px 'Karla';color:var(--ink);outline-color:var(--accent);
  }
  .section{display:none}
  .section.visible{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .mt{margin-top:16px}.mb{margin-bottom:16px}
  .muted{color:var(--muted);font-size:12.5px}
  .hairline{border:0;border-top:1px solid var(--line);margin:14px 0}

  /* ===== Dashboard ===== */
  .countdown-card{
    background:var(--card-lite);border:1px solid var(--line);border-radius:var(--radius);
    padding:30px 26px 34px;text-align:center;position:relative;overflow:hidden;
  }
  .countdown-card::before{content:"";position:absolute;inset:10px;border:1.5px solid var(--card2);border-radius:10px;pointer-events:none}
  .cd-title{font-family:'Nunito',sans-serif;font-size:19px;color:var(--ink)}
  .cd-units{display:flex;justify-content:center;gap:26px;margin:18px 0 8px;flex-wrap:wrap}
  .cd-num{font-family:'Nunito',sans-serif;font-size:54px;line-height:1;color:var(--ink);min-width:88px;font-variant-numeric:tabular-nums}
  .cd-lbl{font:700 11px 'Karla';letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-top:6px}
  .cd-date{font-size:13px;color:var(--muted)}
  .cd-rule{width:70px;height:3px;background:var(--accent);border-radius:2px;margin:14px auto 10px}
  .dash-grid{grid-template-columns:repeat(3,1fr)}
  .card.tint-gold{background:#FAF1DC;border-color:#EBD9AE}
  .card.tint-green{background:#E9F2EC;border-color:#C8DCD0}
  .card.tint-olive{background:#EFF2E4;border-color:#D8DEC2}
  .card.tint-sand{background:#F3EAD9;border-color:#E0D0B2}
  .card.tint-cream{background:#FBF6EB;border-color:#E8DCC2}
  .stat-num{font-family:'Nunito',sans-serif;font-size:30px}
  .mini-list li{list-style:none;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13.5px;display:flex;justify-content:space-between;gap:8px}
  .mini-list li:last-child{border:0}
  .bar{height:10px;background:var(--card2);border-radius:99px;overflow:hidden;margin-top:8px}
  .bar i{display:block;height:100%;background:var(--gold);border-radius:99px}
  .bar i.leaf{background:var(--leaf)}

  /* ===== Planning ===== */
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .tabs button{border:2px solid var(--card2);background:#fff;border-radius:999px;padding:7px 16px;font:700 12.5px 'Karla';cursor:pointer}
  .tabs button.active{border-color:var(--gold);color:var(--gold)}
  .task{display:flex;align-items:flex-start;gap:12px;padding:11px 4px;border-bottom:1px dashed var(--line)}
  .task:last-child{border:0}
  .task input[type=checkbox]{width:18px;height:18px;accent-color:var(--leaf);margin-top:2px;cursor:pointer}
  .task.done .t-title{text-decoration:line-through;color:var(--muted)}
  .t-title{font-weight:600;font-size:14px}
  .t-meta{font-size:11.5px;color:var(--muted)}
  .tf-head{font-family:'Nunito',sans-serif;font-size:18px;margin:22px 0 4px;display:flex;align-items:center;gap:10px}
  .tf-head .chip{font-size:10px}
  .timeline-item{display:grid;grid-template-columns:74px 14px 1fr;gap:12px;align-items:start;padding:6px 0}
  .timeline-item .time{font:700 13px 'Karla';color:var(--gold);text-align:right}
  .timeline-item .dot{width:12px;height:12px;border-radius:50%;border:3px solid var(--accent);background:#fff;margin-top:3px}
  .timeline-item .what{font-size:14px}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
  .cal-head h3{min-width:200px;text-align:center}
  .cal-nav{border:2px solid var(--gold);background:linear-gradient(180deg,#fff,#FBF1DC);color:var(--gold);box-shadow:0 1px 2px rgba(217,142,4,.18);border-radius:50%;width:34px;height:34px;font:700 16px 'Karla';cursor:pointer;transition:.15s}
  .cal-nav:hover{background:linear-gradient(180deg,#E9A82E,var(--gold));color:#fff}
  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .calendar .dow{font:700 10.5px 'Karla';text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center;padding:4px 0}
  .cal-cell{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:74px;padding:5px 6px;font-size:11.5px;overflow:hidden}
  .cal-cell .d{font-weight:700;font-size:11px;color:var(--muted)}
  .cal-cell.wday{border-color:var(--gold);border-width:2px}
  .cal-evt{margin-top:3px;background:var(--card2);border-left:3px solid var(--accent);border-radius:4px;padding:2px 4px;font-size:10px;line-height:1.25;cursor:pointer}
  .cal-evt:hover{background:#fff}
  .cal-evt .ew{color:var(--muted);font-size:9px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .cal-evt.evt-done b{text-decoration:line-through;color:var(--muted)}
  .cal-cell.empty{background:transparent;border:0}

  /* ===== Budget ===== */
  .budget-stats{grid-template-columns:repeat(5,1fr)}
  .charts-grid{grid-template-columns:1fr 1.3fr}
  .donut{width:175px;height:175px;border-radius:50%;position:relative;flex-shrink:0}
  .donut .hole{position:absolute;inset:24%;background:var(--card);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .donut .hole .stat-num{font-size:17px}
  .dlegend{font-size:12px;display:flex;flex-direction:column;gap:5px;min-width:0}
  .dlegend div{display:flex;align-items:center;gap:7px;white-space:nowrap}
  .dlegend .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .brow{display:grid;grid-template-columns:108px 1fr 118px;gap:10px;align-items:center;margin:8px 0;font-size:12px}
  .bvals{text-align:right;font-variant-numeric:tabular-nums;line-height:1.5;white-space:nowrap}
  .btrack{display:flex;flex-direction:column;gap:3px}
  .bbar{height:11px;border-radius:99px;min-width:2px;position:relative}
  .bbar.est{background:#CBB98F}
  .bbar.act{background:var(--accent)}
  .bbar.act.overb{background:var(--rose)}
  .chart-leg{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-bottom:6px}
  .chart-leg .sw{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px}
  @media (max-width:900px){ .charts-grid{grid-template-columns:1fr} }
  .budget-table{width:100%;border-collapse:collapse;font-size:13.5px}
  .budget-table th{font:700 11px 'Karla';text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:left;padding:8px 6px;border-bottom:2px solid var(--line)}
  .budget-table td{padding:9px 6px;border-bottom:1px dashed var(--line)}
  .budget-table .num{text-align:right;font-variant-numeric:tabular-nums}
  .over{color:var(--rose);font-weight:700}
  .under{color:var(--leaf);font-weight:700}
  .pend{color:var(--gold);font-weight:700}
  .exp-row{display:grid;grid-template-columns:1.4fr .9fr .6fr .8fr 88px;gap:8px;align-items:center;padding:8px 4px;border-bottom:1px dashed var(--line);font-size:13px}
  .exp-row:last-child{border:0}
  .form-grid{display:grid;grid-template-columns:1.4fr 1fr .8fr .9fr auto;gap:8px;align-items:center}

  /* ===== Guests ===== */
  .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .filter-bar button{border:2px solid var(--card2);background:#fff;border-radius:999px;padding:5px 13px;font:700 12px 'Karla';cursor:pointer;color:var(--ink)}
  .filter-bar button.active{border-color:var(--leaf);color:var(--leaf)}
  .guest-row{display:grid;grid-template-columns:1.3fr .9fr .7fr .55fr .9fr 96px;gap:8px;align-items:center;padding:9px 4px;border-bottom:1px dashed var(--line);font-size:13px}
  .guest-row:last-child{border:0}
  .rsvp{cursor:pointer;user-select:none}
  .rsvp.yes{border-color:var(--leaf);color:var(--leaf)}
  .rsvp.no{border-color:var(--rose);color:var(--rose)}
  .rsvp.pending{border-color:var(--gold);color:var(--gold)}
  .edit-box{background:#fff;border:1.5px solid var(--gold);border-radius:10px;padding:14px;margin:8px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .edit-box label{font:700 11px 'Karla';text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:3px}
  .edit-box .full{grid-column:1/-1}
  .seat-floor{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    position:relative;height:520px;overflow:hidden;
    background-image:linear-gradient(var(--card) 1px, transparent 1px),linear-gradient(90deg, var(--card) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .table-obj{position:absolute;cursor:grab;touch-action:none;user-select:none}
  .table-obj:active{cursor:grabbing}
  .table-shape{
    position:absolute;border:3px solid var(--card2);background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Nunito',sans-serif;font-size:13px;transition:border-color .15s;text-align:center;padding:4px;
  }
  .table-obj.dragover .table-shape, .table-obj.selected .table-shape{border-color:var(--accent)}
  .table-shape .cnt{font:700 10.5px 'Karla';color:var(--muted)}
  .table-shape .notfull{font:700 9px 'Karla';letter-spacing:.5px;text-transform:uppercase;color:var(--gold)}
  .table-obj.underfilled .table-shape{border-style:dashed;border-color:var(--gold)}
  .chair{
    position:absolute;background:#fff;border:1.5px solid var(--leaf);color:var(--ink);
    border-radius:999px;padding:2px 7px;font:600 9.5px 'Karla';white-space:nowrap;cursor:grab;
    transform:translate(-50%,-50%);box-shadow:0 1px 2px rgba(0,0,0,.08);display:flex;align-items:center;gap:4px;
  }
  .chair:active{cursor:grabbing}
  .chair:hover{border-color:var(--accent);background:#F2F8F4}
  .chair.swap-over{border-color:var(--gold);background:#FBF1DC;border-style:dashed}
  .chair-x{color:var(--rose);font-weight:800;cursor:pointer;font-size:11px;line-height:1}
  .chair-x:hover{transform:scale(1.3)}
  .table-del{position:absolute;top:-9px;right:-9px;width:20px;height:20px;border-radius:50%;border:2px solid var(--rose);background:#fff;color:var(--rose);font:700 11px 'Karla';cursor:pointer;line-height:1;z-index:5}
  .table-obj.round .table-del{top:-1px;right:5px}
  .seat-guest{display:inline-block;background:var(--card2);border-radius:999px;padding:4px 11px;font:600 12px 'Karla';margin:3px;cursor:grab;border:1.5px solid transparent}
  .seat-guest:active{cursor:grabbing}
  .seat-guest.picked{border-color:var(--accent);color:var(--accent);background:#fff}

  /* ===== Vendors ===== */
  .vendor-grid{grid-template-columns:repeat(2,1fr)}
  .pipeline{display:flex;gap:4px;margin-top:10px}
  .pipeline span{flex:1;text-align:center;font:700 10px 'Karla';text-transform:uppercase;letter-spacing:.5px;padding:5px 2px;border-radius:6px;background:var(--card2);color:var(--muted);cursor:pointer}
  .pipeline span.on{background:var(--leaf);color:#fff}
  .doc-pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;margin:3px 4px 0 0}
  .log-item{font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .log-item:last-child{border:0}
  .log-item .when{color:var(--gold);font-weight:700;margin-right:6px}

  /* ===== Inspiration ===== */
  .mood-grid{columns:3;column-gap:12px}
  .mood-tile{break-inside:avoid;border-radius:12px;margin-bottom:12px;padding:14px;color:#fff;font:600 13px 'Karla';position:relative;min-height:90px;display:flex;align-items:flex-end;cursor:pointer;border:3px solid transparent}
  .mood-tile:hover{border-color:var(--gold)}
  .mood-tile small{opacity:.85;display:block;font-weight:400}
  .swatch-row{display:flex;gap:10px;flex-wrap:wrap}
  .swatch{width:54px;height:54px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:.12s}
  .swatch:hover{transform:scale(1.06)}
  .swatch.picked{border-color:var(--ink)}
  .palette-strip{display:flex;height:64px;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-top:14px}
  .palette-strip div{flex:1;display:flex;align-items:flex-end;justify-content:center;font:700 10px 'Karla';color:#fff;padding-bottom:6px;text-shadow:0 1px 2px rgba(0,0,0,.35)}

  @media (max-width:900px){
    body{flex-direction:column}
    aside{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;border-right:0;border-bottom:1px solid var(--line)}
    .main-col{margin-left:0}
    nav{display:flex;flex-wrap:wrap;gap:4px}
    main{padding:20px}
    .dash-grid,.vendor-grid{grid-template-columns:1fr}

function calMove(dir){
  calM += dir;

  if(calM>11){calM=0;calY++;}
  renderAll();
}

function calendarHTML(){
  const months = T[lang].plan.months;
  const dows = T[lang].plan.dows;
  const daysIn = new Date(calY, calM+1, 0).getDate();
  const firstDow = (new Date(calY, calM, 1).getDay()+6)%7;
  const prefix = String(calY)+'-'+String(calM+1).padStart(2,'0');
  const evts={};
  state.tasks.filter(x=>x.due.startsWith(prefix)).forEach(x=>{ const d=+x.due.slice(8); (evts[d]=evts[d]||[]).push(x); });
  let cells = dows.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysIn; d++){
    const isWed = (calY===2026 && calM===8 && d===12);
    cells += `<div class="cal-cell ${isWed?'wday':''}"><div class="d">${d}</div>
      ${isWed?`<div class="cal-evt" style="border-left-color:var(--gold);font-weight:700;cursor:default">${t('plan.weddingDay')}<div class="ew">15:00 · Dwór Lipowy</div></div>`:''}
      ${(evts[d]||[]).map(x=>`<div class="cal-evt ${x.done?'evt-done':''}" onclick="editingTask=${x.id};renderAll()" title="${(x.det?.[lang]||'').replace(/"/g,'&quot;')}">

        <div class="ew">${t('plan.who.'+x.who)}${x.det?.[lang]?' · '+x.det[lang]:''}</div>
      </div>`).join('')}</div>`;
  }
  const editTask = editingTask!==null ? state.tasks.find(x=>x.id===editingTask) : null;
  return `<div class="card">
    <div class="cal-head">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <h3>${months[calM]} ${calY}</h3>
      <button class="cal-nav" onclick="calMove(1)">›</button>

    ${editTask ? editTaskBoxHTML(editTask) : `<p class="muted" style="margin-top:12px">${t('plan.clickToEdit')}</p>`}

}

function sortDayOf(){

    return k(a.time)-k(b.time);
  });
}

}

/* =================== BUDGET =================== */
function catTotals(key){
  const exp = state.budget.expenses.filter(e=>e.cat===key);
  const act = exp.reduce((s,e)=>s+e.amt,0);
  const paid = exp.filter(e=>e.paid).reduce((s,e)=>s+e.amt,0);
  return {act, paid, pending: act-paid};
}

const PIE_COLORS = ['#356B4F','#D98E04','#C0563B','#8A9B6E','#5B7E9E','#A06B8A','#7B6A4F','#C9A36A','#4A7A52','#9C8458'];
function chartsHTML(actT){
  const rows = state.budget.cats
    .map((c,i)=>({c, i, tt:catTotals(c.key)}))
    .filter(r=>r.tt.act>0 || r.c.est>0);
  /* donut: conic-gradient by actual spend */
  const spenders = rows.filter(r=>r.tt.act>0);
  let acc=0;
  const stops = spenders.map((r,j)=>{
    const pct = r.tt.act/actT*100;
    const col = PIE_COLORS[j%PIE_COLORS.length];
    const seg = `${col} ${acc}% ${acc+pct}%`;
    acc+=pct; return seg;
  }).join(', ');
  /* bars: est vs act, scaled to the max value */
  const maxV = Math.max(...rows.map(r=>Math.max(r.c.est, r.tt.act)), 1);
  return `
  <div class="grid mt charts-grid">
    <div class="card">
      <h3 class="mb">${t('budget.byCat')}</h3>

function tableGeo(tb){
  const seated = state.guests.filter(g=>g.table===tb.id).sort((a,b)=>(a.seat||0)-(b.seat||0));
  if(tb.shape==='round'){
    const W=270, H=250, shapeD=110;
    return {W, H, shapeD, seated,
      shapeStyle:`width:${shapeD}px;height:${shapeD}px;border-radius:50%;left:${(W-shapeD)/2}px;top:${(H-shapeD)/2}px`};
  }
  const perSide = Math.max(1, Math.ceil(seated.length/2));
  const tw = Math.max(150, perSide*92+24);
  const W=tw+24, H=190, th=64;
  return {W, H, tw, th, seated,
    shapeStyle:`width:${tw}px;height:${th}px;border-radius:12px;left:${(W-tw)/2}px;top:${(H-th)/2}px`};
}

function chairHTML(g, x, y){
  return `<div class="chair" style="left:${x}px;top:${y}px" title="${gname(g)}"
    draggable="true"
    ondragstart="dragChair(event,${g.id})"
    ondragover="event.preventDefault();event.stopPropagation();this.classList.add('swap-over')"
    ondragleave="this.classList.remove('swap-over')"
    ondrop="dropChair(event,${g.id})"
    onclick="event.stopPropagation()" onpointerdown="event.stopPropagation()">
    ${gname(g)}<span class="chair-x" title="—" onclick="event.stopPropagation();unseat(${g.id})">×</span>
  </div>`;
}
function chairsHTML(tb, geo){
  if(tb.shape==='round'){
    const cx=geo.W/2, cy=geo.H/2, r=geo.shapeD/2+34;
    const n=geo.seated.length;
    return geo.seated.map((g,i)=>{
      const a=-Math.PI/2 + i*2*Math.PI/Math.max(n,1);
      return chairHTML(g, cx+r*Math.cos(a), cy+r*Math.sin(a));
    }).join('');
  }
  const topY=(geo.H-geo.th)/2-22, botY=(geo.H+geo.th)/2+22;
  return geo.seated.map((g,i)=>{
    const side=i%2, slot=Math.floor(i/2);
    const x=(geo.W-geo.tw)/2 + 46 + slot*92;
    return chairHTML(g, x, side===0?topY:botY);
  }).join('');
}
function dragChair(ev,id){ ev.stopPropagation(); ev.dataTransfer.setData('text/plain','chair:'+id); }
function dropChair(ev,targetId){
  ev.preventDefault(); ev.stopPropagation();
  ev.currentTarget.classList.remove('swap-over');
  const data=ev.dataTransfer.getData('text/plain');
  const target=state.guests.find(g=>g.id===targetId);
  if(data.startsWith('chair:')){
    const src=state.guests.find(g=>g.id===+data.slice(6));
    if(!src || src.id===target.id) return;
    if(src.table===target.table){ /* swap seats within the table */
      const tmp=src.seat; src.seat=target.seat; target.seat=tmp;
    } else { /* moving between tables: take the target's spot ordering */
      trySeat(src.id, target.table); return;
    }
    renderAll();
  } else if(+data){ /* unseated guest dropped onto a chair: seat at that table */
    trySeat(+data, target.table);
  }
}

/* --- table dragging + guest drop, wired after each render --- */
function wireFloor(){
  const floor=document.getElementById('floor'); if(!floor) return;
  floor.querySelectorAll('.table-obj').forEach(el=>{
    const tid=+el.dataset.tid;
    let startX, startY, origX, origY, moved=false, dragging=false;
    el.addEventListener('pointerdown', e=>{
      dragging=true; moved=false;
      startX=e.clientX; startY=e.clientY;
      const tb=state.tables.find(x=>x.id===tid); origX=tb.x; origY=tb.y;
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', e=>{
      if(!dragging) return;
      const dx=e.clientX-startX, dy=e.clientY-startY;
      if(Math.abs(dx)>4||Math.abs(dy)>4) moved=true;
      const fw=floor.clientWidth, fh=floor.clientHeight;
      const nx=Math.max(-30,Math.min(fw-el.offsetWidth+30, origX+dx));
      const ny=Math.max(-20,Math.min(fh-el.offsetHeight+20, origY+dy));
      el.style.left=nx+'px'; el.style.top=ny+'px';
    });
    el.addEventListener('pointerup', e=>{
      if(!dragging) return;
      dragging=false;
      const tb=state.tables.find(x=>x.id===tid);
      tb.x=parseFloat(el.style.left); tb.y=parseFloat(el.style.top);
      if(!moved && pickedGuest) trySeat(pickedGuest, tid); /* click-to-seat */
    });
    el.addEventListener('dragover', e=>{ e.preventDefault(); el.classList.add('dragover'); });
    el.addEventListener('dragleave', ()=> el.classList.remove('dragover'));
    el.addEventListener('drop', e=>{
      e.preventDefault(); el.classList.remove('dragover');
      const data=e.dataTransfer.getData('text/plain');
      if(data.startsWith('chair:')){ trySeat(+data.slice(6), tid); return; } /* chair dragged onto another table */
      if(+data) trySeat(+data, tid);
    });
  });
}

      <div class="card">
        <div class="spread">
          <div><span class="chip" style="border-color:var(--gold);color:var(--gold)">${v.cat[lang]}</span>
          <h3 style="margin-top:6px">${v.name}</h3>
          <div class="muted">${v.contact}</div></div>
          <button class="btn sm" onclick="editingVendor=${v.id};renderAll()">✎ ${t('vendors.edit')}</button>
        </div>
        <div class="pipeline">
          ${T[lang].vendors.stages.map((s,i)=>`<span class="${i<=v.stage?'on':''}" onclick="setStage(${v.id},${i})">${s}</span>`).join('')}
        </div>
        <hr class="hairline">
        <div class="muted" style="margin-bottom:4px"><strong>${t('vendors.notes')}:</strong> ${v.notes[lang]}</div>
        <div><strong class="muted">${t('vendors.docs')}:</strong>
          ${v.docs.map(d=>`<span class="doc-pill">📄 ${d[lang]}</span>`).join('')}
          <button class="btn sm gold" style="margin-top:4px" onclick="toast(t('vendors.uploaded'))">${t('vendors.upload')}</button>
        </div>
        <hr class="hairline">
        <strong class="muted">${t('vendors.log')}:</strong>
        ${v.log.map(l=>`<div class="log-item"><span class="when">${l.when}</span>${l[lang]}</div>`).join('')||'<div class="muted log-item">—</div>'}
        <div class="row" style="margin-top:8px">
          <input type="text" id="log-${v.id}" placeholder="${t('vendors.logPh')}" style="flex:1">
          <button class="btn sm" onclick="addLog(${v.id})">${t('vendors.addLog')}</button>
        </div>
      </div>`).join('')}
  </div>`;
}
function setStage(id,i){ state.vendors.find(v=>v.id===id).stage=i; renderAll(); }
function editVendorBoxHTML(v){
  return `<div class="card"><div class="edit-box" style="margin:0">
    <div><label>${t('vendors.fName')}</label><input type="text" id="vn" value="${v.name.replace(/"/g,'&quot;')}" style="width:100%"></div>
    <div><label>${t('vendors.fCat')}</label><input type="text" id="vc" value="${(v.cat[lang]||v.cat.en).replace(/"/g,'&quot;')}" style="width:100%"></div>
    <div><label>${t('vendors.fContact')}</label><input type="text" id="vk" value="${v.contact.replace(/"/g,'&quot;')}" style="width:100%"></div>
    <div><label>${t('vendors.fNotes')}</label><input type="text" id="vo" value="${(v.notes[lang]||v.notes.en||'').replace(/"/g,'&quot;')}" style="width:100%"></div>
    <div class="full row">
      <button class="btn" onclick="saveVendor(${v.id})">${t('vendors.save')}</button>
      <button class="btn sm gold" onclick="editingVendor=null;renderAll()">${t('vendors.cancel')}</button>
    </div>
  </div></div>`;
}
function saveVendor(id){
  const v=state.vendors.find(v=>v.id===id);
  const n=document.getElementById('vn').value.trim(); if(n) v.name=n;
  const c=document.getElementById('vc').value.trim(); if(c) v.cat={en:c, pl:c};
  v.contact=document.getElementById('vk').value.trim();
  const o=document.getElementById('vo').value.trim(); v.notes={en:o, pl:o};
  editingVendor=null; renderAll();
}
function addLog(id){
  const el=document.getElementById('log-'+id); const v=el.value.trim(); if(!v) return;
  const d=new Date(); const when = String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
  state.vendors.find(x=>x.id===id).log.unshift({when, en:v, pl:v});
  renderAll();
}

/* =================== INSPIRATION =================== */
const SWATCHES = ['#D6456B','#E8A0B4','#FFFFFF','#EADDC4','#C9A36A','#8A9B6E','#4A7A52','#7B6A4F','#D98E04','#1C1813'];
function inspHTML(){
  return `
  <h1 class="page-title">${t('insp.title')}</h1>
  <p class="page-sub">${t('insp.sub')}</p>
  <div class="card">
    <div class="spread mb"><h3>${t('insp.board')}</h3><button class="btn" onclick="addPin()">${t('insp.addPin')}</button></div>
    <div class="mood-grid">
      ${state.mood.map((m,i)=>`<div class="mood-tile" style="background:${m.c};min-height:${90+(i%3)*36}px">
        ${m[lang]}<small>${m.c}</small></div>`).join('')}
    </div>
  </div>
  <div class="card mt">
    <h3 class="mb">${t('insp.palette')}</h3>
    <p class="muted mb">${t('insp.paletteHint')}</p>
    <div class="swatch-row">
      ${SWATCHES.map(c=>`<div class="swatch ${palette.includes(c)?'picked':''}" style="background:${c};${c==='#FFFFFF'?'border:1.5px solid var(--line);':''}" onclick="togglePalette('${c}')"></div>`).join('')}
    </div>
    <div class="muted mt" style="font-weight:700">${t('insp.yourPalette')}:</div>
    <div class="palette-strip">${palette.map(c=>`<div style="background:${c}">${c}</div>`).join('')||''}</div>
  </div>
  <div class="card mt">
    <div class="spread mb"><h3>${t('insp.theme')}</h3>
      <div class="row">
        <button class="btn sm gold" onclick="saveNotes()">${t('insp.save')}</button>
        <button class="btn sm" onclick="toast(t('insp.sharedTheme'))">${t('insp.shareTheme')}</button>
      </div>
    </div>
    <textarea id="themeNotes" rows="4" style="width:100%">${state.themeNotes[lang]}</textarea>
  </div>`;
}
function togglePalette(c){
  if(palette.includes(c)) palette=palette.filter(x=>x!==c);
  else if(palette.length<5) palette.push(c);
  renderAll();
}
function addPin(){
  const colors=['#A85C68','#9C8458','#6E7F5A','#C77B4F','#857A9B'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  state.mood.unshift({c, en:'New inspiration pin', pl:'Nowa inspiracja'});
  renderAll();
}
function saveNotes(){ state.themeNotes[lang]=document.getElementById('themeNotes').value; toast(t('insp.saved')); }

/* =================== MAIN RENDER =================== */
function renderAll(){
  renderNav();
  renderTopbar();
  renderOverlay();
  const map={dashboard:dashHTML, planning:planHTML, budget:budgetHTML, guests:guestsHTML, vendors:vendorsHTML, inspiration:inspHTML};
  document.getElementById('main').innerHTML = `<div class="section visible">${map[section]()}</div>`;
  tickCountdown();
  wireFloor();
}
renderAll();
</script>
</body>
</html>
